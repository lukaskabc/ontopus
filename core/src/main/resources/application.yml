spring:
  profiles:
    active: "@spring.profiles.active@"
  application:
    name: OntoPuS
    version: "@ontopus.core.version@"
  threads:
    virtual:
      enabled: true # enables virtual threads
  servlet:
    multipart:
      max-file-size: 10MB

# use Spring "swagger" profile to enable Swagger
springdoc:
  api-docs:
    enabled: false
#  show-login-endpoint: true

logging:
  level:
    web: debug

server:
  servlet:
    session:
      timeout: 10m
  tomcat:
    max-part-count: 30
